<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>엑셀/CSV 파일 병합 도구</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
  :root{
    color-scheme: light dark;
    --bg:#ffffff; --fg:#1a1a1a; --muted:#666; --border:#ddd; --accent:#2563eb; --card:#f7f7f8;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#1a1a1a; --fg:#eaeaea; --muted:#999; --border:#3a3a3a; --accent:#60a5fa; --card:#242424; }
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; padding:24px; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;
    line-height:1.5;
  }
  h1{ font-size:1.4rem; margin:0 0 4px; }
  .sub{ color:var(--muted); margin:0 0 20px; font-size:0.9rem; }
  .dropzone{
    border:2px dashed var(--border); border-radius:10px; padding:32px; text-align:center;
    cursor:pointer; margin-bottom:20px; transition:border-color .15s;
  }
  .dropzone.drag{ border-color:var(--accent); }
  .dropzone p{ margin:4px 0; color:var(--muted); }
  input[type=file]{ display:none; }
  .file-card{
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:16px; margin-bottom:14px;
  }
  .file-card h3{ margin:0 0 10px; font-size:1rem; display:flex; justify-content:space-between; align-items:center; }
  .file-card h3 button{ font-size:0.75rem; }
  .row{ display:flex; gap:16px; flex-wrap:wrap; margin-bottom:10px; }
  .field{ display:flex; flex-direction:column; gap:4px; min-width:180px; }
  label{ font-size:0.8rem; color:var(--muted); }
  select, input[type=text]{
    padding:6px 8px; border-radius:6px; border:1px solid var(--border);
    background:var(--bg); color:var(--fg); font-size:0.9rem;
  }
  .columns{ display:flex; flex-wrap:wrap; gap:6px 14px; max-height:120px; overflow-y:auto; padding:8px; border:1px solid var(--border); border-radius:6px; }
  .columns label{ display:flex; align-items:center; gap:4px; color:var(--fg); font-size:0.85rem; white-space:nowrap; }
  .options{
    display:flex; gap:20px; flex-wrap:wrap; align-items:flex-end; margin:20px 0;
    background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px;
  }
  button{
    background:var(--accent); color:#fff; border:none; border-radius:8px;
    padding:10px 18px; font-size:0.95rem; cursor:pointer;
  }
  button.secondary{ background:transparent; color:var(--accent); border:1px solid var(--accent); padding:4px 10px; }
  button:disabled{ opacity:0.5; cursor:not-allowed; }
  #mergeBtn{ font-size:1rem; padding:12px 24px; }
  #log{ white-space:pre-wrap; font-size:0.85rem; color:var(--muted); margin-top:14px; }
  #result{ margin-top:16px; }
  table{ border-collapse:collapse; font-size:0.82rem; margin-top:10px; }
  th, td{ border:1px solid var(--border); padding:4px 8px; }
  th{ background:var(--card); }
  .hint{ font-size:0.78rem; color:var(--muted); }
</style>
</head>
<body>

<h1>엑셀 / CSV 파일 병합 도구</h1>
<p class="sub">파일을 업로드하고, 파일마다 매칭 키와 남길 컬럼을 선택한 뒤 병합합니다. 모든 처리는 브라우저 안에서만 이루어지며 파일은 서버로 전송되지 않습니다.</p>

<div class="dropzone" id="dropzone">
  <p><strong>여기를 클릭하거나 파일을 끌어다 놓으세요</strong></p>
  <p>.xlsx / .xls / .csv 파일 여러 개 선택 가능</p>
  <input type="file" id="fileInput" multiple accept=".xlsx,.xls,.csv" />
</div>

<div id="fileList"></div>

<div class="options" id="optionsBar" style="display:none;">
  <div class="field">
    <label>병합 방식 (join_type)</label>
    <select id="joinType">
      <option value="left">left — 첫 파일 기준, 안 맞으면 빈 칸</option>
      <option value="inner">inner — 완전일치만 남김</option>
      <option value="outer">outer — 양쪽 다 유지, 안 맞으면 빈 칸</option>
    </select>
  </div>
  <div class="field">
    <label>결과 파일 형식</label>
    <select id="outputFormat">
      <option value="xlsx">xlsx</option>
      <option value="csv">csv</option>
    </select>
  </div>
  <div class="field">
    <label>결과 파일명</label>
    <input type="text" id="outputName" value="result" />
  </div>
  <button id="mergeBtn">병합 실행</button>
</div>

<div id="log"></div>
<div id="result"></div>

<script>
const state = { files: [] }; // {id, name, workbook, sheetNames, sheet, headers, rows, key, columns}

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const fileListEl = document.getElementById('fileList');
const optionsBar = document.getElementById('optionsBar');
const logEl = document.getElementById('log');
const resultEl = document.getElementById('result');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function log(msg){ logEl.textContent = msg; }

function handleFiles(fileListRaw){
  const files = Array.from(fileListRaw);
  files.forEach(file => {
    const reader = new FileReader();
    const isCsv = /\.csv$/i.test(file.name);
    reader.onload = (ev) => {
      let workbook;
      try {
        if (isCsv) {
          workbook = XLSX.read(ev.target.result, { type: 'string' });
        } else {
          workbook = XLSX.read(ev.target.result, { type: 'array' });
        }
      } catch (err) {
        log(`오류: ${file.name} 을(를) 읽을 수 없습니다. (${err.message})`);
        return;
      }
      const entry = {
        id: crypto.randomUUID(),
        name: file.name,
        workbook,
        sheetNames: workbook.SheetNames,
        sheet: workbook.SheetNames[0],
        key: null,
        columns: null,
      };
      loadSheet(entry, entry.sheet);
      state.files.push(entry);
      renderFileList();
    };
    if (isCsv) reader.readAsText(file);
    else reader.readAsArrayBuffer(file);
  });
}

function loadSheet(entry, sheetName){
  const ws = entry.workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { defval: '', raw: false });
  const headers = rows.length ? Object.keys(rows[0]) : (XLSX.utils.sheet_to_json(ws, { header:1 })[0] || []);
  entry.sheet = sheetName;
  entry.rows = rows;
  entry.headers = headers;
  if (!entry.key || !headers.includes(entry.key)) entry.key = headers[0] || null;
  entry.columns = headers.slice();
}

function removeFile(id){
  state.files = state.files.filter(f => f.id !== id);
  renderFileList();
}

function renderFileList(){
  fileListEl.innerHTML = '';
  state.files.forEach(entry => {
    const card = document.createElement('div');
    card.className = 'file-card';

    const title = document.createElement('h3');
    title.innerHTML = `<span>${entry.name}</span>`;
    const removeBtn = document.createElement('button');
    removeBtn.className = 'secondary';
    removeBtn.textContent = '제거';
    removeBtn.onclick = () => removeFile(entry.id);
    title.appendChild(removeBtn);
    card.appendChild(title);

    const row = document.createElement('div');
    row.className = 'row';

    if (entry.sheetNames.length > 1) {
      const sheetField = document.createElement('div');
      sheetField.className = 'field';
      sheetField.innerHTML = `<label>시트</label>`;
      const sheetSelect = document.createElement('select');
      entry.sheetNames.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        if (s === entry.sheet) opt.selected = true;
        sheetSelect.appendChild(opt);
      });
      sheetSelect.onchange = () => { loadSheet(entry, sheetSelect.value); renderFileList(); };
      sheetField.appendChild(sheetSelect);
      row.appendChild(sheetField);
    }

    const keyField = document.createElement('div');
    keyField.className = 'field';
    keyField.innerHTML = `<label>매칭 키 컬럼</label>`;
    const keySelect = document.createElement('select');
    entry.headers.forEach(h => {
      const opt = document.createElement('option');
      opt.value = h; opt.textContent = h;
      if (h === entry.key) opt.selected = true;
      keySelect.appendChild(opt);
    });
    keySelect.onchange = () => { entry.key = keySelect.value; };
    keyField.appendChild(keySelect);
    row.appendChild(keyField);

    const rowsField = document.createElement('div');
    rowsField.className = 'field';
    rowsField.innerHTML = `<label>행 개수</label><span class="hint">${entry.rows.length}행</span>`;
    row.appendChild(rowsField);

    card.appendChild(row);

    const colsLabel = document.createElement('label');
    colsLabel.textContent = '결과에 남길 컬럼';
    card.appendChild(colsLabel);

    const colsBox = document.createElement('div');
    colsBox.className = 'columns';
    entry.headers.forEach(h => {
      const lbl = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = entry.columns.includes(h);
      cb.onchange = () => {
        if (cb.checked) { if (!entry.columns.includes(h)) entry.columns.push(h); }
        else { entry.columns = entry.columns.filter(c => c !== h); }
      };
      lbl.appendChild(cb);
      lbl.appendChild(document.createTextNode(h));
      colsBox.appendChild(lbl);
    });
    card.appendChild(colsBox);

    fileListEl.appendChild(card);
  });

  optionsBar.style.display = state.files.length >= 2 ? 'flex' : 'none';
  if (state.files.length < 2) log('파일을 2개 이상 업로드하면 병합할 수 있습니다.');
  else log('');
}

function trimKey(v){
  if (v === undefined || v === null) return '';
  return String(v).trim();
}

function pick(row, columns){
  const out = {};
  columns.forEach(c => { out[c] = row[c] !== undefined ? row[c] : ''; });
  return out;
}

function mergeAll(files, joinType){
  const base = files[0];
  let resultRows = base.rows.map(r => pick(r, base.columns));
  let resultKeys = base.rows.map(r => trimKey(r[base.key]));
  let usedNames = new Set(base.columns);

  for (let i = 1; i < files.length; i++) {
    const f = files[i];
    const renamed = f.columns.map(c => usedNames.has(c) ? `${c}_${i+1}` : c);
    const index = new Map();
    f.rows.forEach(r => {
      const k = trimKey(r[f.key]);
      if (!index.has(k)) index.set(k, r);
    });

    const newRows = [];
    const newKeys = [];
    const matchedKeys = new Set();

    for (let j = 0; j < resultRows.length; j++) {
      const k = resultKeys[j];
      const match = index.get(k);
      if (match) matchedKeys.add(k);
      if (joinType === 'inner' && !match) continue;
      const rightVals = {};
      f.columns.forEach((c, idx) => { rightVals[renamed[idx]] = match ? (match[c] !== undefined ? match[c] : '') : ''; });
      newRows.push({ ...resultRows[j], ...rightVals });
      newKeys.push(k);
    }

    if (joinType === 'outer') {
      const blankLeft = {};
      usedNames.forEach(c => { blankLeft[c] = ''; });
      index.forEach((row, k) => {
        if (!matchedKeys.has(k)) {
          const rightVals = {};
          f.columns.forEach((c, idx) => { rightVals[renamed[idx]] = row[c] !== undefined ? row[c] : ''; });
          newRows.push({ ...blankLeft, ...rightVals });
          newKeys.push(k);
        }
      });
    }

    resultRows = newRows;
    resultKeys = newKeys;
    renamed.forEach(c => usedNames.add(c));
  }

  return resultRows;
}

document.getElementById('mergeBtn').addEventListener('click', () => {
  if (state.files.length < 2) return;
  for (const f of state.files) {
    if (!f.key) { log(`오류: ${f.name}의 매칭 키를 선택하세요.`); return; }
    if (!f.columns.length) { log(`오류: ${f.name}에서 최소 1개 컬럼을 선택하세요.`); return; }
  }

  const joinType = document.getElementById('joinType').value;
  const outputFormat = document.getElementById('outputFormat').value;
  const outputName = document.getElementById('outputName').value || 'result';

  let merged;
  try {
    merged = mergeAll(state.files, joinType);
  } catch (err) {
    log(`병합 중 오류: ${err.message}`);
    return;
  }

  log(`완료: ${merged.length}행, ${merged.length ? Object.keys(merged[0]).length : 0}열`);
  renderPreview(merged);
  downloadResult(merged, outputFormat, outputName);
});

function renderPreview(rows){
  resultEl.innerHTML = '';
  if (!rows.length) return;
  const cols = Object.keys(rows[0]);
  const table = document.createElement('table');
  const thead = document.createElement('tr');
  cols.forEach(c => { const th = document.createElement('th'); th.textContent = c; thead.appendChild(th); });
  table.appendChild(thead);
  rows.slice(0, 10).forEach(r => {
    const tr = document.createElement('tr');
    cols.forEach(c => { const td = document.createElement('td'); td.textContent = r[c]; tr.appendChild(td); });
    table.appendChild(tr);
  });
  resultEl.appendChild(document.createElement('p')).innerHTML =
    `<span class="hint">미리보기 (상위 10행)</span>`;
  resultEl.appendChild(table);
}

function downloadResult(rows, format, name){
  const ws = XLSX.utils.json_to_sheet(rows);
  if (format === 'csv') {
    const csv = XLSX.utils.sheet_to_csv(ws);
    const blob = new Blob(["﻿" + csv], { type: 'text/csv;charset=utf-8;' });
    triggerDownload(blob, `${name}.csv`);
  } else {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'result');
    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    const blob = new Blob([wbout], { type: 'application/octet-stream' });
    triggerDownload(blob, `${name}.xlsx`);
  }
}

function triggerDownload(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
